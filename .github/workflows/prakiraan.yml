name: prakiraan
    
on:
  workflow_dispatch:
  schedule:
    - cron: '5 23 * * *'   # 06.00 WIB setiap hari
 
jobs:
  run-prakiraan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download video template
        run: |
          gdown "https://drive.google.com/uc?id=${{ secrets.VIDEO_TEMPLATE_ID }}" \
            -O prakiraan.mp4

      - name: Run script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python new_prakiraan.py

      # Opsional: simpan output sebagai artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prakiraan-output
          path: |
            prakiraan_cuaca.csv
            output/prakiraan_video_output.mp4

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prakiraan Cuaca STMKG</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

#container{
    width:100vw;
    height:100vh;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.controls{
    opacity:0;
    transition:0.5s;
}

#container:hover .controls{
    opacity:1;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>

<div id="container">

<video id="weatherVideo" autoplay loop>
    <source src="assets/current_weather.mp4">
</video>

<div class="controls">

<button onclick="toggleSound()">
🔊 Suara
</button>

<button id="fullscreenBtn" onclick="toggleFullscreen()">
⛶ Perbesar
</button>

</div>

<script>

const video=document.getElementById(
    "weatherVideo"
);

const fullscreenBtn=document.getElementById(
    "fullscreenBtn"
);

// autoplay tetap berjalan
video.muted=true;


// Tombol suara
function toggleSound(){

    video.muted=!video.muted;

}


// Tombol fullscreen ↔ kecilkan
function toggleFullscreen(){

    if(!document.fullscreenElement){

        document.documentElement.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}


// Ubah tulisan tombol otomatis
document.addEventListener(
    "fullscreenchange",
    ()=>{

        if(document.fullscreenElement){

            fullscreenBtn.innerHTML=
            "🗗 Kecilkan";

        }else{

            fullscreenBtn.innerHTML=
            "⛶ Perbesar";

        }

    }
);


// Refresh video tiap 5 menit
setInterval(()=>{

    location.reload();

},300000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prakiraan Cuaca STMKG</title>
 
<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

#container{
    width:100vw;
    height:100vh;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.controls{
    position:absolute;
    bottom:20px;
    right:20px;
    display:flex;
    gap:10px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>

<div id="container">

<video id="weatherVideo" autoplay loop>
    <source src="assets/current_weather.mp4">
</video>

<div class="controls">

<button onclick="toggleSound()">
🔊 Suara
</button>

<button onclick="fullScreen()">
⛶ Fullscreen
</button>

</div>

</div>

<script>

const video=document.getElementById(
    "weatherVideo"
);

// mulai dalam mode mute agar autoplay jalan
video.muted=true;

function toggleSound(){

    video.muted=!video.muted;

}

function fullScreen(){

    let elem=document.documentElement;

    if(elem.requestFullscreen){
        elem.requestFullscreen();
    }

}

// refresh otomatis tiap 5 menit
setInterval(()=>{

    location.reload();

},300000);

</script>

</body>
</html>

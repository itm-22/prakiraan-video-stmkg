<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prakiraan Cuaca STMKG</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#container{
    width:100vw;
    height:100vh;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.controls{
    position:absolute;
    bottom:20px;
    right:20px;
    display:flex;
    gap:10px;
    z-index:999;
}

button{

    padding:12px 18px;
    font-size:16px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    background:rgba(255,255,255,0.85);

    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<div id="container">

    <video
        id="weatherVideo"
        autoplay
        loop>

        <source src="assets/current_weather.mp4">

        Browser tidak mendukung video.

    </video>

    <div class="controls">

        <button
        onclick="toggleSound()">

        🔊 Suara

        </button>

        <button
        id="fullscreenBtn"
        onclick="toggleFullscreen()">

        ⛶ Perbesar

        </button>

    </div>

</div>


<script>

const video =
document.getElementById(
"weatherVideo"
);

const fullscreenBtn =
document.getElementById(
"fullscreenBtn"
);


// mulai mute agar autoplay bekerja
video.muted=true;



// tombol suara
function toggleSound(){

    video.muted=
    !video.muted;

}



// fullscreen ↔ keluar fullscreen
function toggleFullscreen(){

    if(
        !document.fullscreenElement
    ){

        document
        .documentElement
        .requestFullscreen();

    }

    else{

        document
        .exitFullscreen();

    }

}



// ubah teks tombol otomatis
document.addEventListener(

"fullscreenchange",

()=>{

    if(
        document.fullscreenElement
    ){

        fullscreenBtn.innerHTML=
        "🗗 Kecilkan";

    }

    else{

        fullscreenBtn.innerHTML=
        "⛶ Perbesar";

    }

}

);


// refresh otomatis setiap 5 menit
setInterval(()=>{

    location.reload();

},300000);



</script>

</body>
</html>
